name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # ============================================================================
  # Smart Contracts Build & Test
  # ============================================================================
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/**/target
          key: ${{ runner.os }}-rust-${{ hashFiles('contracts/**/Cargo.toml') }}

      - name: Build event_stream contract
        run: |
          cd contracts/event_stream
          cargo build --target wasm32-unknown-unknown --release

      - name: Build live_poll contract
        run: |
          cd contracts/live_poll
          cargo build --target wasm32-unknown-unknown --release

      - name: Run contract tests (event_stream)
        run: |
          cd contracts/event_stream
          cargo test

      - name: Run contract tests (live_poll)
        run: |
          cd contracts/live_poll
          cargo test

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: contracts-wasm
          path: |
            contracts/live_poll/target/wasm32-unknown-unknown/release/live_poll.wasm
            contracts/event_stream/target/wasm32-unknown-unknown/release/event_stream.wasm
          retention-days: 30

  # ============================================================================
  # Frontend Build & Test
  # ============================================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run Jest tests
        run: npm test -- --passWithNoTests

      - name: Run Vitest tests
        run: npm run test:vitest -- --run

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org:443
          NEXT_PUBLIC_CONTRACT_ID: CCA26PC7SVUMK43SVNHVSGQCTZ4NV3BSLDF7XV3ODHJVH5AFTYQWTJRU

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: .next
          retention-days: 7

  # ============================================================================
  # Security Scan
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        run: |
          cargo install cargo-audit
          cd contracts/live_poll
          cargo audit
          cd ../event_stream
          cargo audit

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  # ============================================================================
  # Deploy to Vercel (on main branch)
  # ============================================================================
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [contracts, frontend, security]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: contracts-wasm
          path: contracts-wasm

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org:443
          NEXT_PUBLIC_CONTRACT_ID: CCA26PC7SVUMK43SVNHVSGQCTZ4NV3BSLDF7XV3ODHJVH5AFTYQWTJRU

      - name: Deploy to Vercel
        id: deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Validate deployment
        run: curl --fail --retry 3 --retry-delay 10 ${{ steps.deploy.outputs.url }}
