name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Smart Contracts Build & Test
  # ============================================================================
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build event_stream contract
        run: |
          cd contracts/event_stream
          cargo build --target wasm32-unknown-unknown --release

      - name: Build live_poll contract
        run: |
          cd contracts/live_poll
          cargo build --target wasm32-unknown-unknown --release

      - name: Test event_stream
        run: |
          cd contracts/event_stream
          cargo test

      - name: Test live_poll
        run: |
          cd contracts/live_poll
          cargo test

  # ============================================================================
  # Frontend Build & Test
  # ============================================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:vitest -- --run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org:443
          NEXT_PUBLIC_CONTRACT_ID: CCA26PC7SVUMK43SVNHVSGQCTZ4NV3BSLDF7XV3ODHJVH5AFTYQWTJRU

  # ============================================================================
  # Security Scan
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo audit
        run: |
          cargo install cargo-audit
          cd contracts/live_poll && cargo audit
          cd ../event_stream && cargo audit

      - name: NPM audit
        run: npm audit --audit-level=moderate
