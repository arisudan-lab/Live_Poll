name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contracts:
    name: Contracts Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Build event_stream
        run: |
          cd contracts/event_stream
          cargo build --target wasm32-unknown-unknown --release
      - name: Build live_poll
        run: |
          cd contracts/live_poll
          cargo build --target wasm32-unknown-unknown --release
      - name: Run Rust tests (contracts)
        run: |
          cd contracts/live_poll
          cargo test --verbose

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install
        run: npm ci
      - name: Run tests
        run: npm test -- --passWithNoTests
      - name: Build
        run: npm run build
